<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | Stellar Journeys</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>
    
    <!-- Loader -->
    <div id="loader">
        <div class="spaceship">🛸</div>
        <h2>Securing Coordinates...</h2>
    </div>

    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="logo">STELLAR<span>JOURNEYS</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="destinations.html">Destinations</a></li>
            <li><a href="packages.html">Packages</a></li>
            <li><a href="booking.html" class="active">Booking</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Content -->
    <main class="page-container">
        <h1 class="section-title">Reserve Your Journey</h1>
        
        <div class="glass-form-container">
            <form id="booking-form" class="glass-form">
                <div class="form-group">
                    <label for="name">Traveler Name</label>
                    <input type="text" id="name" class="glass-input" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="destination">Destination</label>
                    <select id="destination" class="glass-input" required>
                        <option value="" disabled selected>Select a destination</option>
                        <!-- Options will be loaded via JS -->
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="date">Departure Date</label>
                    <input type="date" id="date" class="glass-input" required>
                </div>
                
                <button type="submit" class="neon-button" style="width: 100%; margin-top: 10px;">Confirm Booking</button>
            </form>
            <p id="booking-message" style="margin-top: 20px; color: var(--neon-blue); font-weight: bold;"></p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="main.js"></script>
</body>
</html>

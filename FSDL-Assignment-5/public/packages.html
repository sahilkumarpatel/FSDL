<body>

    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="logo">STELLAR<span>JOURNEYS</span></div>
        <ul class="nav-links">

                <div class="orbit-item" style="top: 50%; left: 0;">Jovian Explorer<br><span>$45,000</span></div>
